<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 10px 20px;
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-size: 10px;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #2563eb;
            padding-bottom: 8px;
        }

        .logo-section {
            flex: 0 0 auto;
        }

        .logo {
            max-height: 60px;
            max-width: 200px;
            object-fit: contain;
        }

        .info-section {
            flex: 1;
            text-align: right;
            padding-left: 20px;
        }

        .lab-name {
            font-size: 14px;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 4px;
        }

        .lab-details {
            font-size: 9px;
            color: #4b5563;
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <div class="header-container">
        <div class="logo-section">
            <img src="{{LAB_LOGO}}" class="logo" alt="Lab Logo">
        </div>
        <div class="info-section">
            <div class="lab-name">{{LAB_NAME}}</div>
            <div class="lab-details">
                {{LAB_ADDRESS}}<br>
                Phone: {{LAB_PHONE}}<br>
                Email: {{LAB_EMAIL}}
            </div>
        </div>
    </div>
</body>

</html>
