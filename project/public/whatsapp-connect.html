<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp QR Code Connection</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            max-width: 600px; 
            margin: 0 auto;
        }
        .container { 
            text-align: center; 
            padding: 20px; 
            border: 2px solid #25D366; 
            border-radius: 10px; 
            background: #f9f9f9;
        }
        .qr-container { 
            margin: 20px 0; 
            padding: 20px; 
            background: white; 
            border-radius: 8px;
        }
        button { 
            padding: 15px 30px; 
            background: #25D366; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px;
            margin: 10px;
        }
        button:hover { background: #1da851; }
        .status { 
            padding: 10px; 
            margin: 10px 0; 
            border-radius: 5px; 
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        img { max-width: 300px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🟢 WhatsApp Connection Setup</h1>
        <p>Your WhatsApp session is ready but not connected. Scan the QR code below with WhatsApp mobile app.</p>
        
        <div id="status" class="status info">
            Click "Get QR Code" to start connection process
        </div>
        
        <button onclick="getQRCode()" id="qrBtn">📱 Get QR Code</button>
        <button onclick="checkStatus()" id="statusBtn">🔍 Check Status</button>
        
        <div id="qrContainer" class="qr-container" style="display: none;">
            <h3>📲 Scan this QR code with WhatsApp:</h3>
            <div id="qrCodeArea"></div>
            <p><small>Open WhatsApp → Settings → Linked Devices → Link a Device</small></p>
        </div>
    </div>

    <script>
        const SESSION_ID = '79be1730-8ed5-45f3-968a-37fac823d7fa';
        const NETLIFY_BASE = 'https://eclectic-sunshine-3d25be.netlify.app';
        
        async function getQRCode() {
            const statusDiv = document.getElementById('status');
            const qrBtn = document.getElementById('qrBtn');
            const qrContainer = document.getElementById('qrContainer');
            const qrCodeArea = document.getElementById('qrCodeArea');
            
            qrBtn.disabled = true;
            qrBtn.textContent = 'Loading...';
            statusDiv.className = 'status info';
            statusDiv.textContent = 'Requesting QR code...';
            
            try {
                const response = await fetch(`${NETLIFY_BASE}/.netlify/functions/whatsapp-qr?sessionId=${SESSION_ID}&labId=test-lab`);
                const result = await response.json();
                
                console.log('QR response:', result);
                
                if (result.qrCode) {
                    qrCodeArea.innerHTML = `<img src="${result.qrCode}" alt="WhatsApp QR Code">`;
                    qrContainer.style.display = 'block';
                    statusDiv.className = 'status success';
                    statusDiv.textContent = 'QR Code loaded! Scan with WhatsApp mobile app.';
                } else if (result.rawQR) {
                    qrCodeArea.innerHTML = `<pre style="font-size: 8px; line-height: 1;">${result.rawQR}</pre>`;
                    qrContainer.style.display = 'block';
                    statusDiv.className = 'status success';
                    statusDiv.textContent = 'Raw QR Code loaded! Use QR scanner app.';
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = `No QR code available: ${result.message || 'Unknown error'}`;
                }
            } catch (error) {
                console.error('QR error:', error);
                statusDiv.className = 'status error';
                statusDiv.textContent = `Failed to get QR code: ${error.message}`;
            } finally {
                qrBtn.disabled = false;
                qrBtn.textContent = '📱 Get QR Code';
            }
        }
        
        async function checkStatus() {
            const statusDiv = document.getElementById('status');
            const statusBtn = document.getElementById('statusBtn');
            
            statusBtn.disabled = true;
            statusBtn.textContent = 'Checking...';
            
            try {
                const response = await fetch(`${NETLIFY_BASE}/.netlify/functions/whatsapp-status?sessionId=${SESSION_ID}&labId=test-lab`);
                const result = await response.json();
                
                console.log('Status response:', result);
                
                if (result.success && result.data?.sessions) {
                    const session = result.data.sessions.find(s => s.sessionId === SESSION_ID);
                    if (session && session.isConnected) {
                        statusDiv.className = 'status success';
                        statusDiv.textContent = `✅ WhatsApp Connected! Phone: ${session.phoneNumber || 'N/A'}`;
                    } else {
                        statusDiv.className = 'status info';
                        statusDiv.textContent = '⏳ Session exists but not connected to WhatsApp. Scan QR code.';
                    }
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = `❌ ${result.message || result.error || 'Unknown status'}`;
                }
            } catch (error) {
                console.error('Status error:', error);
                statusDiv.className = 'status error';
                statusDiv.textContent = `Failed to check status: ${error.message}`;
            } finally {
                statusBtn.disabled = false;
                statusBtn.textContent = '🔍 Check Status';
            }
        }
        
        // Auto-check status on page load
        window.onload = () => {
            setTimeout(checkStatus, 1000);
        };
    </script>
</body>
</html>
