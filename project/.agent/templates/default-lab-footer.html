<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 10px 20px;
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-size: 9px;
            color: #6b7280;
        }

        .footer-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #d1d5db;
            padding-top: 8px;
        }

        .footer-left,
        .footer-center,
        .footer-right {
            flex: 1;
        }

        .footer-center {
            text-align: center;
        }

        .footer-right {
            text-align: right;
        }

        .page-number {
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="footer-container">
        <div class="footer-left">
            Generated: {{GENERATED_DATE}}
        </div>
        <div class="footer-center">
            <span class="page-number">
                Page <span class="pageNumber"></span> of <span class="totalPages"></span>
            </span>
        </div>
        <div class="footer-right">
            {{LAB_NAME}} | {{LAB_WEBSITE}}
        </div>
    </div>
</body>

</html>
