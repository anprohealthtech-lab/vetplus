[build]
  command = "npm run build"
  publish = "dist"

[functions]
  # Default timeout for all functions (in seconds)
  # Free tier: max 10s, Pro tier: max 26s, Business/Enterprise: max 900s
  # For AI-heavy functions, we need extended timeout
  node_bundler = "esbuild"

# Extended timeout for AI report analysis (requires Pro plan or higher)
[functions."report-to-template"]
  timeout = 60

# PDF Generation Worker - Disabled for dev (use on-demand trigger instead)
# [[functions]]
#   schedule = "*/30 * * * *"
#   name = "pdf-worker"

# SPA fallback
[[redirects]]
  from = "/app/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional proxy to external WhatsApp backend
# If you want to call the backend via relative path (/api/whatsapp),
# set VITE_WHATSAPP_API_BASE_URL="" and enable the proxy below.
# Otherwise, leave this as-is and let the app call the absolute URL directly.
#
# [[redirects]]
#   from = "/api/whatsapp/*"
#   to = "https://lionfish-app-nmodi.ondigitalocean.app/api/whatsapp/:splat"
#   status = 200
#   force = true
