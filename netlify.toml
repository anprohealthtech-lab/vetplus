[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback
[[redirects]]
  from = "/app/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional proxy to external WhatsApp backend
# If you want to call the backend via relative path (/api/whatsapp),
# set VITE_WHATSAPP_API_BASE_URL="" and enable the proxy below.
# Otherwise, leave this as-is and let the app call the absolute URL directly.
#
# [[redirects]]
#   from = "/api/whatsapp/*"
#   to = "https://lionfish-app-nmodi.ondigitalocean.app/api/whatsapp/:splat"
#   status = 200
#   force = true
