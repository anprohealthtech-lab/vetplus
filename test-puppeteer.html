<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Puppeteer Edge Function</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    button {
      background: #3b82f6;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover {
      background: #2563eb;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      background: #f9fafb;
    }
    .success { border-color: #10b981; background: #d1fae5; }
    .error { border-color: #ef4444; background: #fee2e2; }
    pre {
      background: #1f2937;
      color: #f3f4f6;
      padding: 10px;
      border-radius: 5px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>🎭 Puppeteer Edge Function Test</h1>
  
  <div>
    <button onclick="testWarmup()">Test Warmup</button>
    <button onclick="testPDFGeneration()">Test PDF Generation</button>
  </div>

  <div id="result"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    // Replace with your Supabase credentials
    const SUPABASE_URL = 'https://scqhzbkkradflywariem.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjcWh6YmtrcmFkZmx5d2FyaWVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzA0NDY1MjcsImV4cCI6MjA0NjAyMjUyN30.wvvl_TgIRgiFh0d1sSlsvfT-T4nChm_bvd1ZuRLCZ6I';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    window.testWarmup = async function() {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '<div class="result">Testing warmup...</div>';
      
      try {
        const startTime = performance.now();
        const { data, error } = await supabase.functions.invoke('generate-pdf-puppeteer', {
          body: { warmup: true }
        });
        const duration = performance.now() - startTime;

        if (error) throw error;

        resultDiv.innerHTML = `
          <div class="result success">
            <h3>✅ Warmup Successful</h3>
            <p><strong>Duration:</strong> ${duration.toFixed(0)}ms</p>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          </div>
        `;
      } catch (error) {
        resultDiv.innerHTML = `
          <div class="result error">
            <h3>❌ Warmup Failed</h3>
            <pre>${error.message}\n\n${JSON.stringify(error, null, 2)}</pre>
          </div>
        `;
      }
    };

    window.testPDFGeneration = async function() {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '<div class="result">Generating PDF...</div>';

      const sampleHtml = `
        <!DOCTYPE html>
        <html>
        <head>
          <style>
            body { font-family: Arial, sans-serif; padding: 20px; }
            h1 { color: #3b82f6; }
            table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
            th { background-color: #f3f4f6; }
          </style>
        </head>
        <body>
          <h1>Test Report</h1>
          <p>Generated at: ${new Date().toLocaleString()}</p>
          <table>
            <tr><th>Parameter</th><th>Value</th><th>Reference</th></tr>
            <tr><td>Hemoglobin</td><td>14.5</td><td>13-17 g/dL</td></tr>
            <tr><td>WBC Count</td><td>8000</td><td>4000-11000 /µL</td></tr>
            <tr><td>Platelet Count</td><td>250000</td><td>150000-400000 /µL</td></tr>
          </table>
        </body>
        </html>
      `;
      
      try {
        const startTime = performance.now();
        const { data, error } = await supabase.functions.invoke('generate-pdf-puppeteer', {
          body: {
            html: sampleHtml,
            orderId: 'test-' + Date.now(),
            variant: 'draft',
            filename: 'test-report.pdf'
          }
        });
        const duration = performance.now() - startTime;

        if (error) throw error;

        resultDiv.innerHTML = `
          <div class="result success">
            <h3>✅ PDF Generated Successfully</h3>
            <p><strong>Total Duration:</strong> ${duration.toFixed(0)}ms</p>
            ${data.url ? `<p><strong>PDF URL:</strong> <a href="${data.url}" target="_blank">Download PDF</a></p>` : ''}
            <h4>Performance Breakdown:</h4>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          </div>
        `;
      } catch (error) {
        resultDiv.innerHTML = `
          <div class="result error">
            <h3>❌ PDF Generation Failed</h3>
            <pre>${error.message}\n\n${JSON.stringify(error, null, 2)}</pre>
          </div>
        `;
      }
    };
  </script>
</body>
</html>
